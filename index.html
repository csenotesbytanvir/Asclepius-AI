<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <base href="/" />
    <title>Asclepius AI - Medical Intelligence</title>
    <meta name="description" content="Advanced medical intelligence and clinical decision support system." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Dynamic Favicon matching the DNA Logo -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%233B82F6'/%3E%3Cstop offset='100%25' stop-color='%2306B6D4'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M60,20 Q100,60 60,100 T60,180' stroke='url(%23g)' stroke-width='20' stroke-linecap='round' fill='none'/%3E%3Cpath d='M140,20 Q100,60 140,100 T140,180' stroke='%238B5CF6' stroke-width='20' stroke-linecap='round' fill='none'/%3E%3C/svg%3E" />

    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              background: 'var(--bg-app)',
              surface: 'var(--bg-surface)',
              surfaceHighlight: 'var(--bg-highlight)',
              primary: 'var(--color-primary)',
              secondary: 'var(--color-secondary)',
              accent: 'var(--color-accent)',
              textPrimary: 'var(--text-primary)',
              textSecondary: 'var(--text-secondary)',
              success: '#10B981',
              warning: '#F59E0B',
              danger: '#EF4444',
            },
            boxShadow: {
              'glow': 'var(--shadow-glow)',
              'glow-accent': 'var(--shadow-accent)',
              'glow-heavy': '0 0 50px rgba(59, 130, 246, 0.5)',
            },
            animation: {
              'float': 'float 6s ease-in-out infinite',
              'float-y': 'floatY 5s ease-in-out infinite',
              'pulse-glow': 'pulseGlow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'aurora': 'aurora 20s linear infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              floatY: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-15px)' },
              },
              pulseGlow: {
                '0%, 100%': { opacity: 1 },
                '50%': { opacity: .7 },
              },
              aurora: {
                '0%': { backgroundPosition: '0% 50%' },
                '50%': { backgroundPosition: '100% 50%' },
                '100%': { backgroundPosition: '0% 50%' },
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        /* Default (Nebula) */
        --bg-app: #05050A;
        --bg-surface: #0F1218;
        --bg-highlight: #1A1E29;
        --color-primary: #3B82F6;
        --color-secondary: #8B5CF6;
        --color-accent: #06B6D4;
        --text-primary: #F8FAFC;
        --text-secondary: #94A3B8;
        --shadow-glow: 0 0 20px rgba(139, 92, 246, 0.15);
        --shadow-accent: 0 0 20px rgba(6, 182, 212, 0.15);
      }

      .theme-clinical {
        --bg-app: #F0F4F8;
        --bg-surface: #FFFFFF;
        --bg-highlight: #E2E8F0;
        --color-primary: #0284C7; /* Sky 600 */
        --color-secondary: #4F46E5; /* Indigo 600 */
        --color-accent: #0D9488; /* Teal 600 */
        --text-primary: #0F172A;
        --text-secondary: #475569;
        --shadow-glow: 0 4px 15px -1px rgba(2, 132, 199, 0.3);
        --shadow-accent: 0 4px 15px -1px rgba(13, 148, 136, 0.3);
      }

      .theme-onyx {
        --bg-app: #000000;
        --bg-surface: #0A0A0A;
        --bg-highlight: #171717;
        --color-primary: #FFFFFF;
        --color-secondary: #737373;
        --color-accent: #404040;
        --text-primary: #EDEDED;
        --text-secondary: #A0A0A0;
        --shadow-glow: 0 0 25px rgba(255, 255, 255, 0.15);
        --shadow-accent: 0 0 25px rgba(255, 255, 255, 0.15);
      }

      html, body {
        background-color: var(--bg-app);
        color: var(--text-primary);
        font-family: 'Inter', sans-serif;
        transition: background-color 0.5s ease, color 0.5s ease;
        margin: 0;
        padding: 0;
        width: 100vw;
        min-height: 100%;
        overflow-x: hidden;
      }
      
      #root {
        min-height: 100vh;
        width: 100%;
        display: flex;
        flex-direction: column;
      }
      
      /* Global Animated Background Layer */
      .aurora-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #0f172a);
        background-size: 400% 400%;
        animation: aurora 20s ease infinite;
        opacity: 0.8;
      }

      .theme-clinical .aurora-bg {
         background: linear-gradient(-45deg, #f0f9ff, #e0f2fe, #dbeafe, #f0f9ff);
         opacity: 1;
      }
      
      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--bg-highlight); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
      
      /* Transparency Utilities */
      .glass-panel {
        background: rgba(15, 18, 24, 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .theme-clinical .glass-panel {
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(0, 0, 0, 0.05);
      }

      /* Prescription Print Layout */
      @media print {
        @page { margin: 0; size: A4 portrait; }
        body {
          background-color: white !important;
          color: black !important;
          overflow: visible !important;
          height: auto !important;
        }
        .no-print { display: none !important; }
        .print-only { display: block !important; }
        .aurora-bg { display: none !important; }
        
        #root, main, .max-w-6xl { 
          width: 100% !important; 
          max-width: none !important; 
          margin: 0 !important; 
          padding: 0 !important;
          height: auto !important;
          overflow: visible !important;
          position: static !important;
        }

        .print-section {
          background: white !important;
          border: none !important;
          box-shadow: none !important;
          color: black !important;
          padding: 1cm !important;
          width: 100% !important;
          position: static !important;
        }

        h1, h2, h3, h4, p, span, div, strong {
          color: black !important;
          text-shadow: none !important;
        }
        
        .print-header {
            border-bottom: 2px solid #000 !important;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?deps=react@18.2.0",
    "react-dom": "https://esm.sh/react-dom@18.2.0?deps=react@18.2.0",

    "react-router-dom": "https://esm.sh/react-router-dom@6.22.3?deps=react@18.2.0,react-dom@18.2.0",
    "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0",
    "uuid": "https://esm.sh/uuid@9.0.1",
    "react-hook-form": "https://esm.sh/react-hook-form@7.51.0?deps=react@18.2.0",
    "clsx": "https://esm.sh/clsx@2.1.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.1/",
    "react/": "https://esm.sh/react@^19.2.1/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
