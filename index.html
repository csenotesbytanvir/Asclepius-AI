<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <base href="/" />
    <title>Asclepius AI - Clinical Intelligence Console</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%233b82f6%22/><path d=%22M30 50 L70 50 M50 30 L50 70%22 stroke=%22white%22 stroke-width=%2215%22 stroke-linecap=%22round%22/></svg>">
    <meta name="description" content="Advanced medical intelligence and clinical decision support system." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              background: 'var(--bg-app)',
              surface: 'var(--bg-surface)',
              surfaceHighlight: 'var(--bg-highlight)',
              primary: 'var(--color-primary)',
              secondary: 'var(--color-secondary)',
              accent: 'var(--color-accent)',
              textPrimary: 'var(--text-primary)',
              textSecondary: 'var(--text-secondary)',
              border: 'var(--border-color)',
            },
            boxShadow: {
              'glow': '0 0 15px var(--shadow-color)',
              'clinical': '0 8px 30px -10px rgba(0,0,0,0.4)',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --bg-app: #030712;
        --bg-surface: rgba(17, 24, 39, 0.8);
        --bg-highlight: rgba(31, 41, 55, 0.6);
        --color-primary: #3b82f6;
        --color-secondary: #8b5cf6;
        --color-accent: #06b6d4;
        --text-primary: #f9fafb;
        --text-secondary: #9ca3af;
        --border-color: rgba(75, 85, 99, 0.4);
        --shadow-color: rgba(59, 130, 246, 0.2);
      }
      .theme-clinical {
        --bg-app: #f8fafc;
        --bg-surface: rgba(255, 255, 255, 0.95);
        --bg-highlight: #ffffff;
        --color-primary: #2563eb;
        --color-secondary: #6366f1;
        --color-accent: #0891b2;
        --text-primary: #0f172a;
        --text-secondary: #64748b;
        --border-color: #e2e8f0;
        --shadow-color: rgba(37, 99, 235, 0.1);
      }
      .theme-onyx {
        --bg-app: #000000;
        --bg-surface: #0a0a0a;
        --bg-highlight: #121212;
        --color-primary: #3b82f6;
        --color-secondary: #3f3f46;
        --color-accent: #27272a;
        --text-primary: #ffffff;
        --text-secondary: #71717a;
        --border-color: #27272a;
        --shadow-color: rgba(255, 255, 255, 0.05);
      }
      html, body { 
        background-color: var(--bg-app); 
        color: var(--text-primary); 
        font-family: 'Inter', sans-serif; 
        margin: 0; padding: 0; width: 100vw; height: 100%; 
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }
      .aurora-bg { 
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; 
        background: radial-gradient(circle at 10% 20%, var(--color-primary), transparent 40%),
                    radial-gradient(circle at 90% 80%, var(--color-secondary), transparent 40%),
                    var(--bg-app);
        opacity: 0.1;
        filter: blur(100px);
        pointer-events: none;
      }
      .glass {
        background: var(--bg-surface);
        backdrop-filter: blur(20px) saturate(150%);
        -webkit-backdrop-filter: blur(20px) saturate(150%);
        border: 1px solid var(--border-color);
      }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--color-primary); border-radius: 10px; }
      
      @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(1000%); } }
      .animate-scan { animation: scan 3s ease-in-out infinite; }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3",
        "uuid": "https://esm.sh/uuid@^13.0.0",
        "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
        "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0",
        "react-markdown": "https://esm.sh/react-markdown@^10.1.0",
        "react-hook-form": "https://esm.sh/react-hook-form@^7.69.0",
        "clsx": "https://esm.sh/clsx@^2.1.1"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
